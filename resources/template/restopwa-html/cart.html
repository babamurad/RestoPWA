<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <title>Корзина - RestoPWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 50: '#FFF0EB', 100: '#FFD9CC', 400: '#FF8A5C', 500: '#FF6B35', 600: '#E55A2B', 700: '#CC4A22' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .touch-feedback:active { transform: scale(0.97); }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-xl relative">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-gray-100">
            <div class="flex items-center gap-3 px-4 h-14">
                <a href="index.html" class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full hover:bg-gray-100 transition-colors touch-feedback">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-700"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <h1 class="flex-1 text-lg font-semibold text-gray-900">Корзина</h1>
            </div>
        </header>

        <main id="cart-content" class="px-4 py-4 pb-32">
            <!-- Content loaded by JS -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-100" style="padding-bottom: env(safe-area-inset-bottom, 0px);">
            <div class="flex items-center justify-around h-16 max-w-lg mx-auto">
                <a href="index.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span class="mt-1 text-xs font-medium">Главная</span>
                </a>
                <a href="orders.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span class="mt-1 text-xs font-medium">Заказы</span>
                </a>
                <a href="cart.html" class="relative flex flex-col items-center justify-center w-full h-full text-orange-500">
                    <div class="relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                        <span id="cart-badge" class="absolute -top-2 -right-2 flex items-center justify-center min-w-[18px] h-[18px] px-1 text-xs font-semibold text-white bg-orange-500 rounded-full hidden">0</span>
                    </div>
                    <span class="mt-1 text-xs font-medium">Корзина</span>
                    <div class="absolute top-0 w-12 h-0.5 bg-orange-500 rounded-b-full"></div>
                </a>
                <a href="profile.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="mt-1 text-xs font-medium">Профиль</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            updateCartBadge();
        });

        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cart-content');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center px-4 py-16">
                        <div class="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-500"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        </div>
                        <h2 class="text-xl font-semibold text-gray-900">Корзина пуста</h2>
                        <p class="text-gray-500 text-center mt-2 mb-6">Добавьте блюда из ресторанов, чтобы оформить заказ</p>
                        <a href="index.html" class="px-6 py-3 bg-orange-500 text-white font-semibold rounded-xl hover:bg-orange-600 transition-colors touch-feedback">Перейти к ресторанам</a>
                    </div>
                `;
                return;
            }

            const totalAmount = cart.reduce((sum, item) => sum + item.foodItem.price * item.quantity, 0);
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

            container.innerHTML = `
                <!-- Restaurant Info -->
                <div class="mb-4 p-3 bg-white rounded-xl border border-gray-100">
                    <span class="text-sm text-gray-500">Ресторан</span>
                    <p class="font-semibold text-gray-900">${cart[0].restaurantName}</p>
                </div>

                <!-- Cart Items -->
                <div class="space-y-3">
                    ${cart.map(item => `
                        <div class="flex gap-3 p-3 bg-white rounded-2xl border border-gray-100">
                            <div class="flex-shrink-0 w-20 h-20 overflow-hidden rounded-xl">
                                <img src="${item.foodItem.image}" alt="${item.foodItem.name}" class="w-full h-full object-cover" loading="lazy">
                            </div>
                            <div class="flex flex-col flex-1 min-w-0">
                                <div class="flex items-start justify-between gap-2">
                                    <div>
                                        <h4 class="font-semibold text-gray-900 line-clamp-1">${item.foodItem.name}</h4>
                                        <span class="text-xs text-gray-400">${item.restaurantName}</span>
                                    </div>
                                    <button onclick="deleteItem('${item.foodItem.id}')" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                    </button>
                                </div>
                                <div class="flex items-center justify-between mt-auto pt-2">
                                    <span class="font-bold text-gray-900">${item.foodItem.price * item.quantity} ₽</span>
                                    <div class="flex items-center gap-2">
                                        <button onclick="updateQuantity('${item.foodItem.id}', -1)" class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors touch-feedback">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>
                                        </button>
                                        <span class="w-6 text-center font-semibold text-sm">${item.quantity}</span>
                                        <button onclick="updateQuantity('${item.foodItem.id}', 1)" class="flex items-center justify-center w-7 h-7 rounded-full bg-orange-500 text-white hover:bg-orange-600 transition-colors touch-feedback">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Add checkout bar
            const checkoutBar = document.createElement('div');
            checkoutBar.className = 'fixed bottom-16 left-0 right-0 bg-white border-t border-gray-100 p-4';
            checkoutBar.style.paddingBottom = 'calc(env(safe-area-inset-bottom, 0px) + 16px)';
            checkoutBar.innerHTML = `
                <div class="max-w-lg mx-auto">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-gray-600">${totalItems} ${totalItems === 1 ? 'товар' : totalItems < 5 ? 'товара' : 'товаров'}</span>
                        <span class="text-xl font-bold text-gray-900">${totalAmount} ₽</span>
                    </div>
                    <a href="checkout.html" class="w-full flex items-center justify-center gap-2 px-6 py-4 bg-orange-500 text-white font-semibold rounded-xl hover:bg-orange-600 transition-colors touch-feedback btn-press">
                        <span>Оформить заказ</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </a>
                </div>
            `;
            document.body.appendChild(checkoutBar);
        }

        function updateQuantity(itemId, delta) {
            if (delta > 0) {
                increaseQuantity(itemId);
            } else {
                decreaseQuantity(itemId);
            }
            location.reload();
        }

        function deleteItem(itemId) {
            if (confirm('Удалить товар из корзины?')) {
                removeItem(itemId);
                location.reload();
            }
        }
    </script>
</body>
</html>
