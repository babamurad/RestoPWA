<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <title>Ресторан - RestoPWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 50: '#FFF0EB', 100: '#FFD9CC', 400: '#FF8A5C', 500: '#FF6B35', 600: '#E55A2B', 700: '#CC4A22' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .touch-feedback:active { transform: scale(0.97); }
        .gradient-text {
            background: linear-gradient(135deg, #FF6B35 0%, #E55A2B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slide-up 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-xl relative">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-gray-100">
            <div class="flex items-center gap-3 px-4 h-14">
                <a href="index.html" class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full hover:bg-gray-100 transition-colors touch-feedback">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-700"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <h1 class="flex-1 text-lg font-semibold text-gray-900 truncate" id="restaurant-name">Ресторан</h1>
            </div>
        </header>

        <main id="restaurant-content" class="pb-24">
            <!-- Content loaded by JS -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-100" style="padding-bottom: env(safe-area-inset-bottom, 0px);">
            <div class="flex items-center justify-around h-16 max-w-lg mx-auto">
                <a href="index.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span class="mt-1 text-xs font-medium">Главная</span>
                </a>
                <a href="orders.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span class="mt-1 text-xs font-medium">Заказы</span>
                </a>
                <a href="cart.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <div class="relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                        <span id="cart-badge" class="absolute -top-2 -right-2 flex items-center justify-center min-w-[18px] h-[18px] px-1 text-xs font-semibold text-white bg-orange-500 rounded-full hidden">0</span>
                    </div>
                    <span class="mt-1 text-xs font-medium">Корзина</span>
                </a>
                <a href="profile.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="mt-1 text-xs font-medium">Профиль</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentRestaurant = null;
        let activeMenuCategory = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            const restaurantId = getUrlParam('id');
            if (!restaurantId) {
                window.location.href = 'index.html';
                return;
            }

            currentRestaurant = getRestaurantById(restaurantId);
            if (!currentRestaurant) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('restaurant-name').textContent = currentRestaurant.name;
            renderRestaurantPage();
            updateCartBadge();
        });

        function renderRestaurantPage() {
            const container = document.getElementById('restaurant-content');
            const r = currentRestaurant;
            
            const menuCategories = ['all', ...new Set(r.menu.map(item => item.category))];
            
            const filteredMenu = activeMenuCategory === 'all' 
                ? r.menu 
                : r.menu.filter(item => item.category === activeMenuCategory);

            container.innerHTML = `
                <!-- Cover Image -->
                <div class="relative h-48 overflow-hidden">
                    <img src="${r.coverImage}" alt="${r.name}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                </div>

                <!-- Restaurant Info -->
                <div class="px-4 -mt-6 relative z-10">
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                        <div class="flex items-start justify-between">
                            <div>
                                <h1 class="text-xl font-bold text-gray-900">${r.name}</h1>
                                <p class="text-sm text-gray-500 mt-1">${r.categories.join(' • ')}</p>
                            </div>
                            <button onclick="toggleInfo()" class="p-2 rounded-full hover:bg-gray-100 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            </button>
                        </div>

                        <div class="flex items-center gap-4 mt-3 text-sm">
                            <div class="flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                <span class="font-semibold text-gray-900">${r.rating}</span>
                                <span class="text-gray-500">(${r.reviewCount})</span>
                            </div>
                            <div class="flex items-center gap-1 text-gray-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                <span>${r.deliveryTime}</span>
                            </div>
                            <div class="flex items-center gap-1 text-gray-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                                <span>${r.deliveryFee === 0 ? 'Бесплатно' : r.deliveryFee + ' ₽'}</span>
                            </div>
                        </div>

                        <div id="restaurant-info" class="hidden mt-4 pt-4 border-t border-gray-100">
                            <p class="text-sm text-gray-600">${r.description}</p>
                            <div class="mt-3 flex items-center gap-2 text-sm text-gray-500">
                                <span>Минимальный заказ:</span>
                                <span class="font-medium text-gray-900">${r.minOrder} ₽</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Menu Categories -->
                <div class="mt-4 px-4">
                    <div class="flex gap-2 overflow-x-auto scrollbar-hide -mx-4 px-4 pb-2">
                        ${menuCategories.map(cat => `
                            <button onclick="selectMenuCategory('${cat}')" 
                                class="px-4 py-2 rounded-full whitespace-nowrap text-sm font-medium transition-all duration-200 ${
                                    activeMenuCategory === cat 
                                        ? 'bg-orange-500 text-white shadow-md shadow-orange-500/25' 
                                        : 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50'
                                }">
                                ${cat === 'all' ? 'Все блюда' : cat}
                            </button>
                        `).join('')}
                    </div>
                </div>

                <!-- Menu Items -->
                <div class="mt-4 px-4 pb-4">
                    <h2 class="text-lg font-semibold text-gray-900 mb-3">${activeMenuCategory === 'all' ? 'Все блюда' : activeMenuCategory}</h2>
                    <div class="space-y-3">
                        ${filteredMenu.map(item => renderFoodItem(item)).join('')}
                    </div>
                </div>
            `;
        }

        function renderFoodItem(item) {
            const quantity = getItemQuantity(item.id);
            return `
                <div class="flex gap-3 p-3 bg-white rounded-2xl border border-gray-100">
                    <div class="relative flex-shrink-0 w-24 h-24 overflow-hidden rounded-xl">
                        <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover" loading="lazy">
                        ${item.isPopular ? `
                            <div class="absolute top-1 left-1 flex items-center gap-1 px-1.5 py-0.5 bg-orange-500 text-white text-[10px] font-semibold rounded-full">
                                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-2.072-2.143-3-4-.928 1.857-1.928 1.857-3 4-.5 1-1 1.62-1 3a2.5 2.5 0 0 0 4.5 1.5A2.5 2.5 0 0 0 12 12a2.5 2.5 0 0 0 4.5 1.5A2.5 2.5 0 0 0 21 12c0-1.38-.5-2-1-3-1.072-2.143-2.072-2.143-3-4-.928 1.857-1.928 1.857-3 4-.5 1-1 1.62-1 3a2.5 2.5 0 0 0 2.5 2.5Z"/></svg>
                                Хит
                            </div>
                        ` : ''}
                    </div>
                    <div class="flex flex-col flex-1 min-w-0">
                        <div class="flex items-start justify-between gap-2">
                            <div>
                                <h4 class="font-semibold text-gray-900 line-clamp-1">${item.name}</h4>
                                ${item.weight ? `<span class="text-xs text-gray-400">${item.weight}</span>` : ''}
                            </div>
                        </div>
                        <p class="mt-1 text-sm text-gray-500 line-clamp-2">${item.description}</p>
                        <div class="flex items-center justify-between mt-auto pt-2">
                            <span class="font-bold text-gray-900">${item.price} ₽</span>
                            ${quantity > 0 ? `
                                <div class="flex items-center gap-2">
                                    <button onclick="updateItemQuantity('${item.id}', -1)" class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors touch-feedback">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>
                                    </button>
                                    <span class="w-6 text-center font-semibold">${quantity}</span>
                                    <button onclick="updateItemQuantity('${item.id}', 1)" class="flex items-center justify-center w-8 h-8 rounded-full bg-orange-500 text-white hover:bg-orange-600 transition-colors touch-feedback">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                                    </button>
                                </div>
                            ` : `
                                <button onclick="addItem('${item.id}')" class="flex items-center justify-center w-8 h-8 rounded-full bg-orange-500 text-white hover:bg-orange-600 transition-colors touch-feedback">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleInfo() {
            const info = document.getElementById('restaurant-info');
            info.classList.toggle('hidden');
            if (!info.classList.contains('hidden')) {
                info.classList.add('animate-slide-up');
            }
        }

        function selectMenuCategory(cat) {
            activeMenuCategory = cat;
            renderRestaurantPage();
        }

        function addItem(itemId) {
            const item = currentRestaurant.menu.find(i => i.id === itemId);
            if (item) {
                addToCart(item, currentRestaurant);
                renderRestaurantPage();
            }
        }

        function updateItemQuantity(itemId, delta) {
            if (delta > 0) {
                const item = currentRestaurant.menu.find(i => i.id === itemId);
                if (item) {
                    addToCart(item, currentRestaurant);
                }
            } else {
                removeFromCart(itemId);
            }
            renderRestaurantPage();
        }
    </script>
</body>
</html>
