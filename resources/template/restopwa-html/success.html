<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <title>Заказ оформлен - RestoPWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 50: '#FFF0EB', 100: '#FFD9CC', 400: '#FF8A5C', 500: '#FF6B35', 600: '#E55A2B', 700: '#CC4A22' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .touch-feedback:active { transform: scale(0.97); }
        @keyframes scale-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-scale-in { animation: scale-in 0.3s ease-out forwards; }
        .animate-slide-up { animation: slide-up 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-lg mx-auto bg-gray-50 min-h-screen shadow-xl flex flex-col items-center justify-center px-6">
        <div class="text-center">
            <!-- Success Animation -->
            <div class="relative mb-6">
                <div class="w-24 h-24 mx-auto bg-green-100 rounded-full flex items-center justify-center animate-scale-in">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="absolute inset-0 w-24 h-24 mx-auto bg-green-500/20 rounded-full animate-ping" style="animation-duration: 2s;"></div>
            </div>

            <h1 class="text-2xl font-bold text-gray-900 mb-2 animate-slide-up" style="animation-delay: 0.1s;">Заказ оформлен!</h1>
            <p class="text-gray-500 mb-8 animate-slide-up" style="animation-delay: 0.2s;">Ваш заказ успешно принят и скоро будет передан в работу</p>

            <!-- Order Info Card -->
            <div class="bg-white rounded-2xl p-6 border border-gray-100 mb-8 animate-slide-up" style="animation-delay: 0.3s;">
                <div class="flex items-center justify-center gap-2 mb-4">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-sm font-medium text-green-600">Заказ принят</span>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between text-gray-600">
                        <span>Номер заказа</span>
                        <span class="font-mono font-medium text-gray-900">#ORD-004</span>
                    </div>
                    <div class="flex justify-between text-gray-600">
                        <span>Примерное время</span>
                        <span class="font-medium text-gray-900">30-40 мин</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="space-y-3 animate-slide-up" style="animation-delay: 0.4s;">
                <a href="orders.html" class="w-full flex items-center justify-center gap-2 px-6 py-4 bg-orange-500 text-white font-semibold rounded-xl hover:bg-orange-600 transition-colors touch-feedback">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span>Мои заказы</span>
                </a>
                <a href="index.html" class="w-full flex items-center justify-center gap-2 px-6 py-4 bg-white text-gray-700 font-semibold rounded-xl border border-gray-200 hover:bg-gray-50 transition-colors touch-feedback">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>На главную</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
