<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <title>RestoPWA - Доставка еды</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: {
                            50: '#FFF0EB',
                            100: '#FFD9CC',
                            400: '#FF8A5C',
                            500: '#FF6B35',
                            600: '#E55A2B',
                            700: '#CC4A22',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .animate-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .touch-feedback:active { transform: scale(0.97); }
        .gradient-text {
            background: linear-gradient(135deg, #FF6B35 0%, #E55A2B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-xl relative">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-gray-100">
            <div class="flex items-center gap-3 px-4 h-14">
                <div class="flex items-center gap-2">
                    <div class="flex items-center justify-center w-8 h-8 bg-orange-500 rounded-lg">
                        <span class="text-white font-bold text-sm">R</span>
                    </div>
                    <span class="font-bold text-xl gradient-text">RestoPWA</span>
                </div>
                <button onclick="showSearch()" class="flex-1 flex items-center gap-2 px-4 py-2 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <span class="text-sm">Найти ресторан...</span>
                </button>
                <button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-100 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-700"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
            </div>
        </header>

        <!-- Location Bar -->
        <div class="flex items-center gap-2 px-4 py-2 bg-orange-50 border-b border-orange-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-500"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            <span class="text-sm text-orange-700 truncate">ул. Ленина, 15, кв. 42</span>
        </div>

        <main class="px-4 py-4 space-y-6 pb-24">
            <!-- Categories -->
            <section>
                <h2 class="text-lg font-semibold text-gray-900 mb-3">Категории</h2>
                <div class="flex gap-2 overflow-x-auto scrollbar-hide -mx-4 px-4 pb-2" id="categories">
                    <!-- Categories loaded by JS -->
                </div>
            </section>

            <!-- Popular Restaurants -->
            <section>
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-lg font-semibold text-gray-900">Популярные</h2>
                    <a href="#" class="text-sm text-orange-500 font-medium hover:text-orange-600">Все</a>
                </div>
                <div class="flex gap-4 overflow-x-auto scrollbar-hide -mx-4 px-4 pb-2" id="popular-restaurants">
                    <!-- Popular restaurants loaded by JS -->
                </div>
            </section>

            <!-- Nearby Restaurants -->
            <section>
                <h2 class="text-lg font-semibold text-gray-900 mb-3">Рядом с вами</h2>
                <div class="space-y-3" id="nearby-restaurants">
                    <!-- Nearby restaurants loaded by JS -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-100" style="padding-bottom: env(safe-area-inset-bottom, 0px);">
            <div class="flex items-center justify-around h-16 max-w-lg mx-auto">
                <a href="index.html" class="relative flex flex-col items-center justify-center w-full h-full text-orange-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span class="mt-1 text-xs font-medium">Главная</span>
                    <div class="absolute top-0 w-12 h-0.5 bg-orange-500 rounded-b-full"></div>
                </a>
                <a href="orders.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span class="mt-1 text-xs font-medium">Заказы</span>
                </a>
                <a href="cart.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <div class="relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                        <span id="cart-badge" class="absolute -top-2 -right-2 flex items-center justify-center min-w-[18px] h-[18px] px-1 text-xs font-semibold text-white bg-orange-500 rounded-full hidden">0</span>
                    </div>
                    <span class="mt-1 text-xs font-medium">Корзина</span>
                </a>
                <a href="profile.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="mt-1 text-xs font-medium">Профиль</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Initialize home page
        document.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            renderPopularRestaurants();
            renderNearbyRestaurants();
            updateCartBadge();
        });

        function showSearch() {
            const query = prompt('Введите поисковый запрос:');
            if (query) {
                filterRestaurants(query);
            }
        }
    </script>
</body>
</html>
