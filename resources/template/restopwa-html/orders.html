<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <title>Мои заказы - RestoPWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 50: '#FFF0EB', 100: '#FFD9CC', 400: '#FF8A5C', 500: '#FF6B35', 600: '#E55A2B', 700: '#CC4A22' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .touch-feedback:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-lg mx-auto bg-white min-h-screen shadow-xl relative pb-24">
        <!-- Header -->
        <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-gray-100">
            <div class="flex items-center gap-3 px-4 h-14">
                <a href="profile.html" class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full hover:bg-gray-100 transition-colors touch-feedback">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-700"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <h1 class="flex-1 text-lg font-semibold text-gray-900">Мои заказы</h1>
            </div>
        </header>

        <!-- Filters -->
        <div class="px-4 py-3 bg-white border-b border-gray-100">
            <div class="flex gap-2" id="filters">
                <button onclick="setFilter('all')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-orange-500 text-white shadow-md shadow-orange-500/25" data-filter="all">Все</button>
                <button onclick="setFilter('active')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-filter="active">Активные</button>
                <button onclick="setFilter('completed')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200" data-filter="completed">Завершённые</button>
            </div>
        </div>

        <!-- Orders List -->
        <main class="px-4 py-4">
            <div class="space-y-3" id="orders-list">
                <!-- Loaded by JS -->
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-100" style="padding-bottom: env(safe-area-inset-bottom, 0px);">
            <div class="flex items-center justify-around h-16 max-w-lg mx-auto">
                <a href="index.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span class="mt-1 text-xs font-medium">Главная</span>
                </a>
                <a href="orders.html" class="relative flex flex-col items-center justify-center w-full h-full text-orange-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span class="mt-1 text-xs font-medium">Заказы</span>
                    <div class="absolute top-0 w-12 h-0.5 bg-orange-500 rounded-b-full"></div>
                </a>
                <a href="cart.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <div class="relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                        <span id="cart-badge" class="absolute -top-2 -right-2 flex items-center justify-center min-w-[18px] h-[18px] px-1 text-xs font-semibold text-white bg-orange-500 rounded-full hidden">0</span>
                    </div>
                    <span class="mt-1 text-xs font-medium">Корзина</span>
                </a>
                <a href="profile.html" class="relative flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="mt-1 text-xs font-medium">Профиль</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        let activeFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            renderOrders();
            updateCartBadge();
        });

        function setFilter(filter) {
            activeFilter = filter;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.className = 'filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-orange-500 text-white shadow-md shadow-orange-500/25';
                } else {
                    btn.className = 'filter-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200';
                }
            });
            
            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('orders-list');
            
            let filtered = orderHistory.filter(order => {
                if (activeFilter === 'active') {
                    return ['pending', 'confirmed', 'preparing', 'delivering'].includes(order.status);
                }
                if (activeFilter === 'completed') {
                    return order.status === 'delivered';
                }
                return true;
            });
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-gray-500">Заказы не найдены</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(order => {
                const status = statusConfig[order.status] || statusConfig.pending;
                const totalItems = order.items.reduce((sum, item) => sum + item.quantity, 0);
                
                return `
                    <div class="p-4 bg-white rounded-2xl border border-gray-100 card-hover touch-feedback">
                        <div class="flex items-start justify-between">
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="text-sm font-medium text-gray-500">${order.id}</span>
                                    <span class="text-xs text-gray-400">${formatDate(order.createdAt)}</span>
                                </div>
                                <h4 class="mt-1 font-semibold text-gray-900">${order.restaurantName}</h4>
                            </div>
                            <div class="flex items-center gap-1 px-2 py-1 rounded-full ${status.color}">
                                <span class="text-xs font-medium">${status.label}</span>
                            </div>
                        </div>
                        <div class="mt-3 text-sm text-gray-600">
                            ${totalItems} ${totalItems === 1 ? 'товар' : totalItems < 5 ? 'товара' : 'товаров'}
                        </div>
                        <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                            <span class="font-bold text-gray-900">${order.total} ₽</span>
                            <div class="flex items-center gap-1 text-orange-500">
                                <span class="text-sm font-medium">Подробнее</span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
