<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestoPWA Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .glass {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.7);
        }

        .card {
            transition: all .25s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .btn {
            transition: all .2s ease;
        }

        .btn:active {
            transform: scale(.95);
        }

        .fade {
            animation: fade .3s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-orange-50 via-white to-red-50 text-gray-900">

    <div id="app" class="pb-24">

        <!-- ================= HOME ================= -->
        <div id="home" class="p-4 space-y-6 fade">

            <header class="flex justify-between items-center">
                <div>
                    <p class="text-sm text-gray-500">Deliver to</p>
                    <h1 class="font-bold">Your Location</h1>
                </div>
                <div class="w-10 h-10 bg-gradient-to-tr from-orange-400 to-red-500 rounded-full shadow-lg"></div>
            </header>

            <input placeholder="Search restaurants or food..."
                class="w-full p-4 rounded-2xl bg-white shadow focus:ring-2 focus:ring-orange-400">

            <!-- categories -->
            <div class="flex gap-3 overflow-x-auto">

                <div class="px-4 py-2 bg-gradient-to-r from-orange-400 to-red-500 text-white rounded-full shadow">
                    🍕 Pizza
                </div>

                <div class="px-4 py-2 bg-white rounded-full shadow">🍔 Burger</div>
                <div class="px-4 py-2 bg-white rounded-full shadow">🍣 Sushi</div>
                <div class="px-4 py-2 bg-white rounded-full shadow">🍰 Dessert</div>

            </div>

            <!-- featured -->
            <div class="bg-gradient-to-r from-orange-400 to-red-500 p-5 rounded-3xl text-white shadow-xl">
                <h2 class="text-lg font-bold">🔥 Free delivery today</h2>
                <p class="text-sm opacity-90">On orders over $15</p>
            </div>

            <!-- restaurants -->
            <h2 class="font-semibold text-lg">Popular restaurants</h2>

            <div class="space-y-4">

                <div onclick="openRestaurant()"
                    class="card bg-white rounded-3xl shadow-lg overflow-hidden cursor-pointer">

                    <div class="h-40 bg-gradient-to-r from-gray-200 to-gray-300"></div>

                    <div class="p-4">
                        <h3 class="font-bold text-lg">Pizza House</h3>
                        <p class="text-sm text-gray-500">⭐ 4.7 • 30 min • Italian</p>
                    </div>

                </div>

            </div>

        </div>

        <!-- ================= RESTAURANT ================= -->
        <div id="restaurant" class="hidden fade">

            <div class="h-56 bg-gradient-to-r from-gray-300 to-gray-400 relative">

                <button onclick="go('home')" class="absolute top-4 left-4 glass px-3 py-1 rounded-full shadow">
                    ← Back
                </button>

            </div>

            <div class="p-4 space-y-4">

                <h1 class="text-2xl font-bold">Pizza House</h1>
                <p class="text-gray-500">⭐ 4.7 • Delivery 30 min</p>

                <div id="menu" class="space-y-4"></div>

            </div>

        </div>

        <!-- ================= CART ================= -->
        <div id="cart" class="hidden p-4 space-y-4 fade">

            <h1 class="text-2xl font-bold">Your Cart</h1>

            <div id="cartItems" class="space-y-3"></div>

            <div class="bg-white p-4 rounded-2xl shadow flex justify-between font-bold">
                <span>Total</span>
                <span id="total">$0</span>
            </div>

            <button onclick="go('checkout')"
                class="btn w-full bg-gradient-to-r from-orange-400 to-red-500 text-white py-4 rounded-2xl shadow-lg">
                Checkout
            </button>

        </div>

        <!-- ================= CHECKOUT ================= -->
        <div id="checkout" class="hidden p-4 space-y-4 fade">

            <h1 class="text-2xl font-bold">Checkout</h1>

            <input placeholder="Delivery address" class="w-full p-4 rounded-2xl bg-white shadow">

            <select class="w-full p-4 rounded-2xl bg-white shadow">
                <option>Cash</option>
                <option>Card</option>
            </select>

            <button
                class="btn w-full bg-gradient-to-r from-orange-400 to-red-500 text-white py-4 rounded-2xl shadow-lg">
                Confirm Order
            </button>

        </div>

        <!-- ================= PROFILE ================= -->
        <div id="profile" class="hidden p-4 space-y-4 fade">

            <h1 class="text-2xl font-bold">Profile</h1>

            <div class="bg-white p-5 rounded-2xl shadow flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-tr from-orange-400 to-red-500 rounded-full"></div>
                <div>
                    <h3 class="font-bold">John Doe</h3>
                    <p class="text-sm text-gray-500">Premium user</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow">
                <h3 class="font-semibold mb-2">Orders</h3>
                <p class="text-sm text-gray-500">Order #123 • $15</p>
            </div>

        </div>

    </div>

    <!-- ================= NAV ================= -->
    <nav class="fixed bottom-4 left-4 right-4 glass rounded-2xl shadow-xl">

        <div class="flex justify-around py-3 text-sm">

            <button onclick="go('home')" class="text-orange-500">🏠</button>
            <button onclick="go('cart')">🛒 <span id="cartCount">0</span></button>
            <button onclick="go('profile')">👤</button>

        </div>

    </nav>

    <!-- ================= SCRIPT ================= -->
    <script>

        let screens = ["home", "restaurant", "cart", "checkout", "profile"]

        function go(s) {
            screens.forEach(x => document.getElementById(x).classList.add("hidden"))
            document.getElementById(s).classList.remove("hidden")
        }

        function openRestaurant() {
            go("restaurant")
            loadMenu()
        }

        let menuData = [
            { id: 1, name: "Pepperoni Pizza", price: 12 },
            { id: 2, name: "Cheese Pizza", price: 10 },
            { id: 3, name: "Burger Deluxe", price: 9 }
        ]

        let cart = []

        function loadMenu() {
            let html = ""
            menuData.forEach(i => {
                html += `
<div class="bg-white p-4 rounded-2xl shadow flex justify-between items-center card">
<div>
<h3 class="font-semibold">${i.name}</h3>
<p class="text-sm text-gray-500">$${i.price}</p>
</div>
<button onclick="add(${i.id})"
class="btn bg-gradient-to-r from-orange-400 to-red-500 text-white px-4 py-2 rounded-xl">
+
</button>
</div>`
            })
            document.getElementById("menu").innerHTML = html
        }

        function add(id) {
            let item = cart.find(x => x.id === id)
            if (item) { item.qty++ }
            else {
                let data = menuData.find(x => x.id === id)
                cart.push({ ...data, qty: 1 })
            }
            updateCart()
        }

        function updateCart() {
            let html = ""
            let total = 0
            let count = 0

            cart.forEach(i => {
                total += i.price * i.qty
                count += i.qty

                html += `
<div class="bg-white p-3 rounded-2xl shadow flex justify-between">
<div>${i.name} x${i.qty}</div>
<div>$${i.price * i.qty}</div>
</div>`
            })

            document.getElementById("cartItems").innerHTML = html
            document.getElementById("total").innerText = "$" + total
            document.getElementById("cartCount").innerText = count
        }

    </script>

</body>

</html>
